services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ricemill
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ricemill_dev_2024}
      POSTGRES_DB: ricemill_development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ricemill -d ricemill_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rails s -b 0.0.0.0"
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://ricemill:${DB_PASSWORD:-ricemill_dev_2024}@db:5432/ricemill_development
      RAILS_ENV: development
      DEVISE_JWT_SECRET_KEY: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api/v1

volumes:
  postgres_data:
  backend_bundle:
